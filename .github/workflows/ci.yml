name: CI - Validación de archivos HTML

on:
  push:
    branches: [ develop, feature/* ]
  pull_request:
    branches: [ develop ]

jobs:
  validar-html:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Validar archivos HTML
        run: |
          echo "Buscando archivos HTML en src/test/html..."
          # Validamos solo la carpeta donde están tus archivos
          htmlhint "src/test/html/**/*.html" || echo "Advertencias de formato encontradas"

      - name: Verificar archivos obligatorios
        run: |
          echo "Verificando presencia de archivos críticos..."
          # Definimos la ruta correcta según tu captura de pantalla
          BASE_PATH="src/test/html"
          
          FILES=("index.html" "login.html" "register.html" "post.html")
          
          for file in "${FILES[@]}"; do
            if [ -f "$BASE_PATH/$file" ]; then
              echo "$file encontrado en $BASE_PATH"
            else
              echo "ERROR: $file NO existe en $BASE_PATH"
              exit 1
            fi
          done
