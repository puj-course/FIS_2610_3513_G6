name: CI - Pruebas Unitarias

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias (npm install en lugar de npm ci)
        run: npm install
      
      - name: Ejecutar pruebas unitarias
        run: npm test
        continue-on-error: false
      
      - name: Generar reporte de cobertura
        run: |
          echo "# Reporte de Pruebas Unitarias" > test/reports/summary.md
          echo "Ejecutado: $(date)" >> test/reports/summary.md
          echo "" >> test/reports/summary.md
          echo "## Resultados" >> test/reports/summary.md
          echo "- Las pruebas se ejecutaron correctamente" >> test/reports/summary.md
      
      - name: Subir reportes como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            test/reports/
            test/coverage/
          retention-days: 30
