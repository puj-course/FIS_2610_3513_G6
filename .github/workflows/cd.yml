name: CD - Package for Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create deployment package
      run: |
        mkdir -p deploy-package
        cp *.html deploy-package/ 2>/dev/null || true
        if [ -d "assets" ]; then
          cp -r assets deploy-package/
        fi
        if [ -d "images" ]; then
          cp -r images deploy-package/
        fi

    - name: List package contents
      run: |
        echo "📦 Package contents:"
        ls -la deploy-package/

    - name: Compress package
      run: |
        cd deploy-package
        zip -r ../unimercs-frontend.zip .
        cd ..
        echo "✅ Package created: unimercs-frontend.zip"

    - name: Verify ZIP contents
      run: |
        unzip -l unimercs-frontend.zip
        echo ""
        echo "✅ ZIP file size: $(du -h unimercs-frontend.zip | cut -f1)"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: unimercs-frontend
        path: unimercs-frontend.zip
        retention-days: 7
