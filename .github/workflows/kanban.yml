name: Kanban - Automatización del tablero kanban del proyecto UniMercs :)

#este pipeline automatiza todo el movimiento de issues en el tablero kanban del github en projects
#cuando se abre un PR que viene con referencia de "closes", tal issue pasa a "en progreso".
#cuando el PR se le hace merge, tal issue pasa a done. Nos ayuda a eliminar un trabajo manual cansador y matener el tablero siempre al día.
#.
on:
  pull_request:
    types: [opened, closed]       # Cuando se abre o cierra un PR
  issues:
    types: [opened, assigned]     # Cuando se crea o asigna un issue a alguuien

jobs:

  #trabajo 1: marca un issue como "en progreso" cuando se abre un PR
  marcar-en-progreso:
    name: Marcar issue como En Progreso
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Detectar issues referenciados y agregar label in-progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';
            const texto = body + ' ' + title;

            // Detecta "Closes #N", "Fixes #N", "Resolves #N", "Refs #N"
            const matches = texto.match(/(?:closes|fixes|resolves|refs)\s+#(\d+)/gi);

            if (!matches || matches.length === 0) {
              console.log('No se encontraron issues referenciados en este PR.');
              console.log('Tip: Escribe "Closes #N" en la descripción del PR para vincular issues.');
              return;
            }

            for (const match of matches) {
              const issueNum = parseInt(match.match(/\d+/)[0]);
              console.log(`Procesando Issue #${issueNum}...`);

              // Agregar label "in-progress"
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                labels: ['in-progress']
              }).catch(err => console.log(`Nota: ${err.message}`));

              console.log(`✅ Issue #${issueNum} marcado como in-progress`);
            }

  #trabajo 2: cierra issue y marcarlo como Done al hacer merge el PR

  marcar-done:
    name: Marcar issue como Done al mergear
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Mover issue a Done y cerrar
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const matches = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/gi);

            if (!matches || matches.length === 0) {
              console.log('No se encontraron issues para cerrar.');
              return;
            }

            for (const match of matches) {
              const issueNum = parseInt(match.match(/\d+/)[0]);

              // Agregar label "done"
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                labels: ['done']
              }).catch(err => console.log(err.message));

              // Quitar label "in-progress" si existe
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                name: 'in-progress'
              }).catch(() => {});

              // Cerrar el issue automáticamente
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                state: 'closed'
              });

              console.log(`✅ Issue #${issueNum} cerrado y marcado como done`);
            }

  #trabajo 3: le pone un label de assigned cuando se asigna un issue
  marcar-asignado:
    name: Marcar issue como asignado
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest

    steps:
      - name: Agregar label assigned al issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNum = context.payload.issue.number;
            const assignee = context.payload.assignee?.login || 'desconocido';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              labels: ['assigned']
            }).catch(err => console.log(err.message));

            console.log(`✅ Issue #${issueNum} asignado a ${assignee}`);
