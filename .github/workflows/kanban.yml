name: Kanban - Mover issues automáticamente

on:
  pull_request:
    types: [opened, closed]

# Permisos necesarios para el pipeline
permissions:
  issues: write

jobs:
  mover-kanban:
    runs-on: ubuntu-latest

    steps:
      - name: Mover issue según el Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const isMerged = pr.merged === true;

            const regex = /(?:closes|fixes|resolves|refs)\s+#(\d+)/gi;
            const matches = [...body.matchAll(regex)];

            if (matches.length === 0) {
              console.log("No se encontró ningún issue enlazado en el PR");
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);

              if (context.payload.action === "opened") {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ["in-progress"]
                });
                console.log(`Issue #${issueNumber} → in-progress`);

              } else if (context.payload.action === "closed" && isMerged) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ["done"]
                });

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: "in-progress"
                }).catch(() => {}); 

                console.log(`Issue #${issueNumber} → done`);
              }
            }
