name: Validate - Verificación de Patrones GoF y de la calidad de Código

on:
  push:
    branches: [ feature/*, develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  verificar-patrones-gof:
    name: Verificar Patrones GoF (Factory, Facade, Observer)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar código fuente
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Crear suite de tests para patrones GoF
        run: |
          mkdir -p tests
          cat > tests/gof_patterns.test.mjs << 'TESTEOF'
          import { test, describe } from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync, existsSync } from 'node:fs';

          // ── Helper con rutas de patrones actualizadas ────────────────────────
          function readPattern(filename) {
            const paths = [
              `src/factories/${filename}`,
              `src/facades/${filename}`,
              `src/observers/${filename}`
            ];
            for (const p of paths) {
              if (existsSync(p)) return readFileSync(p, 'utf8');
            }
            throw new Error(`Archivo no encontrado: ${filename}`);
          }

          // ── Tests: Factory Method ─────────────────────────────────────────────
          describe('Patrón 1: Factory Method (user.factory.js)', () => {
            const fileName = 'user.factory.js';
            test('El archivo existe en src/factories/', () => {
              assert.ok(existsSync(`src/factories/${fileName}`), `Falta src/factories/${fileName}`);
            });

            test('Contiene la estructura esperada', () => {
              const code = readPattern(fileName);
              assert.ok(code.includes('class UserFactory'), 'Debe existir la clase UserFactory');
              assert.ok(code.includes('class JaverianaUserFactory'), 'Debe existir JaverianaUserFactory');
              assert.ok(code.includes('@javeriana.edu.co'), 'No se detectó validación de dominio javeriano');
            });
          });

          // ── Tests: Facade ─────────────────────────────────────────────────────
          describe('Patrón 2: Facade (auth.facade.js)', () => {
            const fileName = 'auth.facade.js';
            test('El archivo existe en src/facades/', () => {
              assert.ok(existsSync(`src/facades/${fileName}`), `Falta src/facades/${fileName}`);
            });

            test('Contiene métodos de orquestación', () => {
              const code = readPattern(fileName);
              assert.ok(code.includes('class AuthFacade'), 'Debe existir AuthFacade');
              assert.ok(code.includes('login') && code.includes('logout'), 'Debe tener métodos login y logout');
            });
          });

          // ── Tests: Observer ───────────────────────────────────────────────────
          describe('Patrón 3: Observer (post.observer.js)', () => {
            const fileName = 'post.observer.js';
            test('El archivo existe en src/observers/', () => {
              assert.ok(existsSync(`src/observers/${fileName}`), `Falta src/observers/${fileName}`);
            });

            test('Contiene Subject y Observers', () => {
              const code = readPattern(fileName);
              assert.ok(code.includes('class PostEventBus'), 'Falta el PostEventBus (Subject)');
              assert.ok(code.includes('notify'), 'Falta el método notify');
              assert.ok(code.includes('Updater'), 'Debe tener Observers concretos (Explore/Profile)');
            });
          });
          TESTEOF

      - name: 4. Ejecutar tests de Patrones GoF
        run: |
          node --test tests/gof_patterns.test.mjs

      - name: 5. Verificar integración en archivos HTML específicos
        run: |
          echo "🔍 Verificando integración en src/test/html/..."
          
          # Función para validar presencia de patrones en archivos específicos
          check_html() {
            local file="src/test/html/$1"
            local pattern=$2
            if [ -f "$file" ]; then
              if grep -q "$pattern" "$file"; then
                echo "✅ $1 contiene $pattern"
              else
                echo "⚠️  $1 no contiene $pattern (revisar integración)"
              fi
            else
              echo "❌ ERROR: No se encontró $file"
              exit 1
            fi
          }

          check_html "register.html" "JaverianaUserFactory"
          check_html "login.html" "AuthFacade"
          check_html "post.html" "PostEventBus"
          check_html "index.html" "AuthFacade"

      - name: 6. Generar reporte final
        run: |
          cat > reporte-patrones.md << 'EOF'
          # Reporte de Verificación de Arquitectura
          
          ### Ubicación de Archivos Validados:
          - **JS:** `src/factories/`, `src/facades/`, `src/observers/`
          - **HTML:** `src/test/html/`
          
          ### Estado de Patrones:
          1. **Factory Method:** ✅ Verificado en `user.factory.js`
          2. **Facade:** ✅ Verificado en `auth.facade.js`
          3. **Observer:** ✅ Verificado en `post.observer.js`
          EOF

      - name: 7. Subir reporte como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-arquitectura-unimercs
          path: reporte-patrones.md
