name: Validate - Verificación de Patrones GoF y de la calidad de Código

on:
  push:
    branches: [ feature/*, develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  verificar-patrones-gof:
    name: Verificar Patrones GoF (Factory, Facade, Observer)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar código fuente
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Crear suite de tests para patrones GoF
        run: |
          mkdir -p tests
          cat > tests/gof_patterns.test.mjs << 'TESTEOF'
          import { test, describe } from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync, existsSync } from 'node:fs';

          // ── Helper con tus rutas reales ───────────────────────────────────────
          function readPattern(filename) {
            const paths = [
              `src/factories/${filename}`,
              `src/facades/${filename}`,
              `src/observers/${filename}`,
              filename
            ];
            for (const p of paths) {
              if (existsSync(p)) return readFileSync(p, 'utf8');
            }
            throw new Error(`Archivo no encontrado: ${filename} (buscado en src/factories, facades u observers)`);
          }

          // ── Tests: Factory Method ─────────────────────────────────────────────
          describe('Patrón 1: Factory Method (user.factory.js)', () => {
            const fileName = 'user.factory.js';

            test('El archivo existe', () => {
              assert.ok(existsSync(`src/factories/${fileName}`), `Falta src/factories/${fileName}`);
            });

            test('Contiene la estructura correcta', () => {
              const code = readPattern(fileName);
              assert.ok(code.includes('class UserFactory'), 'Debe existir la clase UserFactory');
              assert.ok(code.includes('class JaverianaUserFactory'), 'Debe existir JaverianaUserFactory');
              assert.ok(code.includes('extends UserFactory'), 'Herencia incorrecta en Factory');
              assert.ok(code.includes('@javeriana.edu.co'), 'No valida el dominio javeriano');
            });
          });

          // ── Tests: Facade ─────────────────────────────────────────────────────
          describe('Patrón 2: Facade (auth.facade.js)', () => {
            const fileName = 'auth.facade.js';

            test('El archivo existe', () => {
              assert.ok(existsSync(`src/facades/${fileName}`), `Falta src/facades/${fileName}`);
            });

            test('Contiene la orquestación de subsistemas', () => {
              const code = readPattern(fileName);
              assert.ok(code.includes('class AuthFacade'), 'Debe existir AuthFacade');
              assert.ok(code.includes('login(') && code.includes('logout'), 'Faltan métodos principales en Facade');
              assert.ok(code.includes('_storage') || code.includes('Storage'), 'Debe manejar el subsistema de Storage');
            });
          });

          // ── Tests: Observer ───────────────────────────────────────────────────
          describe('Patrón 3: Observer (post.observer.js)', () => {
            const fileName = 'post.observer.js';

            test('El archivo existe', () => {
              assert.ok(existsSync(`src/observers/${fileName}`), `Falta src/observers/${fileName}`);
            });

            test('Contiene el Subject y Observers', () => {
              const code = readPattern(fileName);
              assert.ok(code.includes('class PostEventBus'), 'Falta el Subject (PostEventBus)');
              assert.ok(code.includes('notify('), 'Falta el método notify');
              assert.ok(code.includes('ExploreUpdater') || code.includes('ProfileUpdater'), 'Faltan Observers concretos');
            });
          });
          TESTEOF

      - name: 4. Ejecutar tests de Patrones GoF
        run: |
          echo "🧪 Ejecutando verificación en carpetas src/..."
          node --test tests/gof_patterns.test.mjs

      - name: 5. Verificar integración en HTML
        run: |
          echo "🔍 Buscando menciones de los patrones en los HTML..."
          # Buscamos en la raíz (donde suelen estar los HTML)
          grep -rnE "AuthFacade|JaverianaUserFactory|PostEventBus" . --include="*.html" || echo "⚠️ No se encontraron menciones en HTML, pero los archivos JS son correctos."

      - name: 6. Generar reporte
        run: |
          cat > reporte-patrones.md << 'EOF'
          # Reporte de Arquitectura UniMercs
          - **Factory:** `src/factories/user.factory.js` ✅
          - **Facade:** `src/facades/auth.facade.js` ✅
          - **Observer:** `src/observers/post.observer.js` ✅
          EOF

      - name: 7. Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: reporte-arquitectura
          path: reporte-patrones.md
