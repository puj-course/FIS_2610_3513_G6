name: Validate - Verificar los 6 patrones GoF

on:
  push:
    branches: [ develop, feature/*, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  verificar-patrones:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      # === DEBUG: Ver estructura de carpetas ===
      - name: Mostrar estructura de archivos
        run: |
          echo "Estructura del repositorio:"
          find . -type f -name "*.html" | head -20
          ls -la

      # ==================== PATRONES CREACIONALES ====================
      - name: Verificar Factory Method
        run: |
          echo "Buscando Factory Method..."
          grep -r --include="*.html" -q "class JaverianaUserFactory" .
          grep -r --include="*.html" -q "class UserFactory" .
          echo "Factory Method detectado correctamente"

      - name: Verificar Prototype
        run: |
          echo "Buscando Prototype..."
          grep -r --include="*.html" -q "class PostPrototype" .
          grep -r --include="*.html" -q "clone()" .
          grep -r --include="*.html" -q "withNewId()" .
          echo "Prototype detectado correctamente"

      # ==================== PATRONES ESTRUCTURALES ====================
      - name: Verificar Facade
        run: |
          echo "Buscando Facade..."
          grep -r --include="*.html" -q "class AuthFacade" .
          grep -r --include="*.html" -q "class SessionManager" .
          echo "Facade detectado correctamente"

      - name: Verificar Decorator
        run: |
          echo "Buscando Decorator..."
          grep -r --include="*.html" -q "class PostDecorator" .
          grep -r --include="*.html" -q "extends PostDecorator" .
          echo "Decorator detectado correctamente"

      # ==================== PATRONES DE COMPORTAMIENTO ====================
      - name: Verificar Observer
        run: |
          echo "Buscando Observer..."
          grep -r --include="*.html" -q "class PostEventBus" .
          grep -r --include="*.html" -q "notify(post)" .
          echo "Observer detectado correctamente"

      - name: Verificar Strategy
        run: |
          echo "Buscando Strategy..."
          grep -r --include="*.html" -q "class ProductFilter" .
          grep -r --include="*.html" -q "setStrategy" .
          echo "Strategy detectado correctamente"

      # ==================== RESUMEN FINAL ====================
      - name: Resumen de Validación GoF
        run: |
          echo ""
          echo "===================================================="
          echo "¡TODOS LOS 6 PATRONES GoF HAN SIDO VALIDADOS!"
          echo "===================================================="
          echo "Creacionales → Factory Method + Prototype"
          echo "Estructurales → Facade + Decorator"
          echo "Comportamiento → Observer + Strategy"
          echo ""
          echo "Validación completada exitosamente."
          echo "===================================================="
