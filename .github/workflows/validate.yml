name: Validate - Verificar los 6 patrones GoF

on:
  push:
    branches: [ develop, feature/*, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  verificar-patrones:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      # ==================== PATRONES CREACIONALES ====================
      - name: Verificar Factory Method (register.html)
        run: |
          echo "Verificando Factory Method..."
          grep -q "class UserFactory" register.html
          grep -q "class JaverianaUserFactory" register.html
          grep -q "createUser" register.html
          echo "Factory Method detectado correctamente en register.html"

      - name: Verificar Prototype (post.html)
        run: |
          echo "Verificando Prototype..."
          grep -q "class PostPrototype" post.html
          grep -q "clone()" post.html
          grep -q "withNewId()" post.html
          echo "Prototype detectado correctamente en post.html"

      # ==================== PATRONES ESTRUCTURALES ====================
      - name: Verificar Facade (login.html + index.html)
        run: |
          echo "Verificando Facade..."
          grep -q "class AuthFacade" login.html index.html
          grep -q "class SessionManager" login.html index.html
          grep -q "this\.storage" login.html index.html
          echo "Facade detectado correctamente"

      - name: Verificar Decorator (post.html)
        run: |
          echo "Verificando Decorator..."
          grep -q "class BasePost" post.html
          grep -q "class PostDecorator" post.html
          grep -q "extends PostDecorator" post.html
          echo "Decorator detectado correctamente en post.html"

      # ==================== PATRONES DE COMPORTAMIENTO ====================
      - name: Verificar Observer (index.html + post.html)
        run: |
          echo "Verificando Observer..."
          grep -q "class PostObserver" index.html post.html
          grep -q "class PostEventBus" index.html post.html
          grep -q "notify(post)" index.html post.html
          echo "Observer detectado correctamente"

      - name: Verificar Strategy (index.html)
        run: |
          echo "Verificando Strategy..."
          grep -q "class FilterStrategy" index.html
          grep -q "class ProductFilter" index.html
          grep -q "setStrategy" index.html
          echo "Strategy detectado correctamente en index.html"

      # ==================== RESUMEN FINAL ====================
      - name: Resumen de Validación GoF
        run: |
          echo ""
          echo "===================================================="
          echo "¡TODOS LOS 6 PATRONES GoF HAN SIDO VALIDADOS!"
          echo "===================================================="
          echo ""
          echo "Creacionales → Factory Method + Prototype"
          echo "Estructurales → Facade + Decorator"
          echo "Comportamiento → Observer + Strategy"
          echo ""
          echo "Los patrones están correctamente implementados en los archivos HTML."
          echo "===================================================="
