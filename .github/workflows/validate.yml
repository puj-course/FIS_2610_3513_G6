name: Validar uso de patrones de diseño
#edit 2
on:
  push:
  pull_request:

jobs:
  validar-patrones:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      # 2. Buscar patrones en archivos HTML
      - name: Verificar uso de patrones en src/test/html
        run: |
          echo "Iniciando validación de patrones de diseño..."

          FILES=$(find src/test/html -name "*.html")

          # Variables bandera (false = no encontrado)
          decorator=false
          facade=false
          factory=false
          observer=false
          prototype=false
          strategy=false

          for file in $FILES; do
            echo "Revisando archivo: $file"

            grep -iq "decorator" "$file" && decorator=true
            grep -iq "facade" "$file" && facade=true
            grep -iq "factory" "$file" && factory=true
            grep -iq "observer" "$file" && observer=true
            grep -iq "prototype" "$file" && prototype=true
            grep -iq "strategy" "$file" && strategy=true
          done

          echo "----------------------------------------"
          echo "RESULTADOS:"
          echo "Decorator: $decorator"
          echo "Facade: $facade"
          echo "Factory Method: $factory"
          echo "Observer: $observer"
          echo "Prototype: $prototype"
          echo "Strategy: $strategy"
          echo "----------------------------------------"

          if [ "$decorator" = false ] || \
             [ "$facade" = false ] || \
             [ "$factory" = false ] || \
             [ "$observer" = false ] || \
             [ "$prototype" = false ] || \
             [ "$strategy" = false ]; then

            echo "ERROR: No todos los patrones están siendo utilizados en los HTML"
            exit 1
          fi

          echo "ÉXITO: Todos los patrones fueron encontrados"
