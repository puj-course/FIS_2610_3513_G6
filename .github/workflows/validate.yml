name: Validate - Verificación de Patrones GoF y Calidad de Código

on:
  push:
    branches: [ feature/*, develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-validate:
    name: Pipeline de Validación Arquitectónica
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar código fuente
        uses: actions/checkout@v4

      - name: 2. Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Crear suite de tests para patrones GoF
        run: |
          mkdir -p tests
          cat > tests/gof_patterns.test.mjs << 'TESTEOF'
          import { test, describe } from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync, existsSync } from 'node:fs';

          // Helper para leer archivos en las nuevas rutas src/
          function readPattern(filename) {
            const paths = [
              `src/factories/${filename}`,
              `src/facades/${filename}`,
              `src/observers/${filename}`
            ];
            for (const p of paths) {
              if (existsSync(p)) return readFileSync(p, 'utf8');
            }
            throw new Error(`Archivo no encontrado: ${filename}`);
          }

          describe('Validación de Patrones GoF - UniMercs', () => {
            
            test('Factory Method: user.factory.js existe y es válido', () => {
              const code = readPattern('user.factory.js');
              assert.ok(code.includes('class UserFactory'), 'Falta clase base UserFactory');
              assert.ok(code.includes('class JaverianaUserFactory'), 'Falta Concrete Creator');
              assert.ok(code.includes('@javeriana.edu.co'), 'Falta validación de dominio');
            });

            test('Facade: auth.facade.js existe y es válido', () => {
              const code = readPattern('auth.facade.js');
              assert.ok(code.includes('class AuthFacade'), 'Falta clase AuthFacade');
              assert.ok(code.includes('login') && code.includes('logout'), 'Faltan métodos core');
            });

            test('Observer: post.observer.js existe y es válido', () => {
              const code = readPattern('post.observer.js');
              assert.ok(code.includes('class PostEventBus'), 'Falta el Subject');
              assert.ok(code.includes('notify'), 'Falta el método de notificación');
            });
          });
          TESTEOF

      - name: 4. Ejecutar tests de Patrones GoF (JS)
        run: |
          echo "🧪 Ejecutando verificación de lógica JavaScript..."
          node --test tests/gof_patterns.test.mjs

      - name: 5. Validar archivos HTML y Links (Corregido)
        run: |
          echo "🔍 Validando HTML en src/test/html/..."
          
          # Verificar que la carpeta existe
          if [ ! -d "src/test/html" ]; then
            echo "❌ Error: La carpeta src/test/html/ no existe."
            exit 1
          fi

          # 5.1 HTMLHint en la ruta correcta
          npx htmlhint "src/test/html/*.html" || echo "⚠️ HTMLHint encontró advertencias"

          # 5.2 Verificación de integración de patrones en HTML
          check_integration() {
            local file="src/test/html/$1"
            local pattern=$2
            echo "Revisando $file..."
            if grep -q "$pattern" "$file"; then
              echo "  ✅ Patrón $pattern encontrado."
            else
              echo "  ⚠️  Advertencia: $pattern no mencionado en $1"
            fi
          }

          check_integration "register.html" "JaverianaUserFactory"
          check_integration "login.html" "AuthFacade"
          check_integration "post.html" "PostEventBus"

      - name: 6. Verificar Sintaxis JS en todo el proyecto
        run: |
          echo "🔍 Verificando que no haya errores de sintaxis..."
          node --check src/facades/*.js
          node --check src/factories/*.js
          node --check src/observers/*.js

      - name: 7. Generar y subir reporte
        run: |
          cat > reporte-final.md << 'EOF'
          # Reporte de Validación UniMercs
          - **Rutas JS:** Validadas en `src/factories`, `src/facades`, `src/observers` ✅
          - **Rutas HTML:** Validadas en `src/test/html/` ✅
          - **Resultado:** Los archivos fueron localizados y procesados correctamente.
          EOF
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: reporte-unimercs
          path: reporte-final.md
