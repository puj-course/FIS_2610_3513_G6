<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar Sesión | UniMercs</title>
  <meta name="description" content="Inicia sesión en UniMercs" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root{
      --bg: #ffffff;
      --fg: #0f1720;
      --muted: #6b7280;
      --primary: linear-gradient(90deg,#2563eb,#7c3aed);
      --accent: #fb923c;
      --radius: 12px;
      --card: #ffffff;
      --card-shadow: 0 6px 18px rgba(15,23,32,0.06);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      background:linear-gradient(135deg,#1e40af 0%,#7c3aed 100%);
      color:var(--fg);
      -webkit-font-smoothing:antialiased;
      line-height:1.45;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-container{
      width:100%;
      max-width:440px;
      animation:fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    .brand-header{
      text-align:center;
      margin-bottom:32px;
    }

    .brand{
      font-weight:700;
      font-size:32px;
      color:white;
      text-decoration:none;
      display:inline-block;
      margin-bottom:8px;
    }

    .brand-tagline{
      color:rgba(255,255,255,0.9);
      font-size:15px;
      margin:0;
    }

    .login-card{
      background:white;
      border-radius:20px;
      padding:40px;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }

    .card-header{
      text-align:center;
      margin-bottom:32px;
    }

    .card-header h1{
      font-size:28px;
      margin:0 0 8px;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .card-header p{
      color:var(--muted);
      margin:0;
      font-size:15px;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-label{
      display:block;
      font-weight:600;
      font-size:14px;
      color:var(--fg);
      margin-bottom:8px;
    }

    .form-input{
      width:100%;
      border:2px solid #e6e9ef;
      border-radius:10px;
      padding:12px 16px;
      font-size:15px;
      transition:all 0.2s;
      font-family:inherit;
    }

    .form-input:focus{
      outline:0;
      border-color:#2563eb;
      box-shadow:0 0 0 3px rgba(37,99,235,0.1);
    }

    .form-input::placeholder{ color:#9ca3af; }

    .password-wrapper{ position:relative; }

    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:0;
      cursor:pointer;
      color:#6b7280;
      padding:4px;
      transition:color 0.2s;
    }

    .toggle-password:hover{ color:#2563eb; }

    .form-options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
      font-size:14px;
    }

    .remember-me{
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      color:var(--muted);
    }

    .remember-me input{ accent-color:#2563eb; }

    .forgot-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
      transition:color 0.2s;
    }

    .forgot-link:hover{ color:#7c3aed; }

    .btn-submit{
      width:100%;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      border:0;
      padding:14px 28px;
      border-radius:10px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:all 0.2s;
      box-shadow:0 4px 12px rgba(37,99,235,0.3);
      margin-bottom:20px;
    }

    .btn-submit:hover:not(:disabled){
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(37,99,235,0.4);
    }

    .btn-submit:disabled{ opacity:0.6; cursor:not-allowed; }

    .btn-submit.loading{
      position:relative;
      color:transparent;
    }

    .btn-submit.loading::after{
      content:'';
      position:absolute;
      width:20px;
      height:20px;
      top:50%;left:50%;
      margin-left:-10px;margin-top:-10px;
      border:3px solid rgba(255,255,255,0.3);
      border-radius:50%;
      border-top-color:white;
      animation:spin 0.6s linear infinite;
    }

    @keyframes spin{ to{transform:rotate(360deg)} }

    .signup-prompt{
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .signup-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
      transition:color 0.2s;
    }

    .signup-link:hover{ color:#7c3aed; text-decoration:underline; }

    .error-message{
      color:#dc2626;
      font-size:14px;
      margin-bottom:16px;
      padding:12px 16px;
      background:#fef2f2;
      border-radius:8px;
      border-left:3px solid #dc2626;
      display:none;
    }

    .error-message.show{ display:block; animation:slideDown 0.3s; }

    .success-message{
      color:#059669;
      font-size:14px;
      margin-bottom:16px;
      padding:12px 16px;
      background:#f0fdf4;
      border-radius:8px;
      border-left:3px solid #059669;
      display:none;
    }

    .success-message.show{ display:block; animation:slideDown 0.3s; }

    @keyframes slideDown{
      from{opacity:0;transform:translateY(-10px)}
      to{opacity:1;transform:translateY(0)}
    }

    .back-home{ text-align:center; margin-top:24px; }

    .back-link{
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      transition:opacity 0.2s;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .back-link:hover{ opacity:0.8; }

    .toast{
      position:fixed;
      right:20px;bottom:20px;
      background:#111827;
      color:white;
      padding:16px 24px;
      border-radius:12px;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
      opacity:0;
      transform:translateY(20px);
      transition:all 0.3s;
      z-index:1000;
    }

    .toast.show{ opacity:1; transform:translateY(0); }

    @media(max-width:500px){
      .login-card{ padding:32px 24px; }
      .brand{ font-size:28px; }
      .card-header h1{ font-size:24px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="brand-header">
      <a href="index.html" class="brand">
        <img src="https://raw.githubusercontent.com/puj-course/FIS_2610_3513_G6/main/assets/UnimercsLogo.png"
             alt="UNIMERCS" style="height:48px;width:auto;vertical-align:middle;">
      </a>
      <p class="brand-tagline">Tu marketplace de confianza</p>
    </div>

    <div class="login-card">
      <div class="card-header">
        <h1>Bienvenido de nuevo</h1>
        <p>Inicia sesión para continuar</p>
      </div>

      <form id="login-form" novalidate>
        <div id="error-message" class="error-message" role="alert"></div>
        <div id="success-message" class="success-message" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input"
                 placeholder="tu@email.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input"
                   placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Mostrar/ocultar contraseña">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" />
            <span>Recordarme</span>
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Iniciar Sesión</button>

        <div class="signup-prompt">
          ¿No tienes una cuenta? <a href="register.html" class="signup-link">Regístrate</a>
        </div>
      </form>
    </div>

    <div class="back-home">
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Volver al inicio
      </a>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite" hidden></div>

  <script>
  class SessionManager {
    static SESSION_KEY = 'unimercs_current_user';
    static TOKEN_KEY   = 'unimercs_token';
    createSession(user, token) {
      localStorage.setItem(SessionManager.TOKEN_KEY, token);
      localStorage.setItem(SessionManager.SESSION_KEY, JSON.stringify(user));
    }
    destroySession() {
      localStorage.removeItem(SessionManager.SESSION_KEY);
      localStorage.removeItem(SessionManager.TOKEN_KEY);
    }
    getSession()     { const r = localStorage.getItem(SessionManager.SESSION_KEY); return r ? JSON.parse(r) : null; }
    isAuthenticated(){ return this.getSession() !== null; }
  }
  class AuthFacade {
    constructor() { this._session = new SessionManager(); }
    async login(email, password) {
      const res  = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Error al iniciar sesión');
      this._session.createSession(data.user, data.token);
      return data.user;
    }
    logout()          { this._session.destroySession(); }
    getCurrentUser()  { return this._session.getSession(); }
    isAuthenticated() { return this._session.isAuthenticated(); }
  }
  </script>

  <script>
  (function() {
    const toast = document.getElementById('toast');
    function showToast(msg) {
      if (!toast) return;
      toast.textContent = msg;
      toast.hidden = false;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.hidden = true, 300); }, 2500);
    }

    const passwordInput = document.getElementById('password');
    const toggleBtn     = document.getElementById('toggle-password');
    toggleBtn?.addEventListener('click', () => {
      const t = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = t;
      toggleBtn.innerHTML = t === 'password'
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
    });

    const errorEl   = document.getElementById('error-message');
    const successEl = document.getElementById('success-message');

    function showError(msg)   { errorEl.textContent = msg;   errorEl.classList.add('show');   successEl.classList.remove('show'); }
    function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('show'); errorEl.classList.remove('show'); }
    function hideMessages()   { errorEl.classList.remove('show'); successEl.classList.remove('show'); }

    const auth = new AuthFacade();
    if (auth.isAuthenticated()) {
      showSuccess(`Ya tienes sesión activa. Redirigiendo...`);
      setTimeout(() => window.location.href = 'index.html', 1200);
    }

    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const submitBtn  = document.getElementById('submit-btn');

    loginForm?.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email    = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      if (!email || !email.includes('@')) { showError('Por favor ingresa un correo electrónico válido'); return; }
      if (!password)                       { showError('Por favor ingresa tu contraseña'); return; }

      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        const user = await auth.login(email, password);
        showSuccess(`¡Bienvenido de nuevo, ${user.name}!`);
        submitBtn.textContent = '✓ Iniciando sesión...';
        submitBtn.style.background = 'linear-gradient(90deg,#10b981,#059669)';
        setTimeout(() => window.location.href = 'index.html', 1200);
      } catch (err) {
        showError(err.message || 'Error al iniciar sesión. Por favor intenta de nuevo.');
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Iniciar Sesión';
      }
    });

    document.querySelector('.forgot-link')?.addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Función de recuperación de contraseña próximamente');
    });
  })();
  </script>
</body>
</html>
