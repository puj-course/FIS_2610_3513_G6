<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrarse | UniMercs</title>
  <meta name="description" content="Crea tu cuenta en UniMercs" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root{
      --bg: #ffffff;
      --fg: #0f1720;
      --muted: #6b7280;
      --primary: linear-gradient(90deg,#2563eb,#7c3aed);
      --accent: #fb923c;
      --radius: 12px;
      --card: #ffffff;
      --card-shadow: 0 6px 18px rgba(15,23,32,0.06);
    }

    *{box-sizing:border-box}
    html,body{min-height:100%;height:auto}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      background:linear-gradient(135deg,#1e40af 0%,#7c3aed 100%);
      color:var(--fg);
      -webkit-font-smoothing:antialiased;
      line-height:1.45;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .register-container{
      width:100%;
      max-width:480px;
      animation:fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    .brand-header{
      text-align:center;
      margin-bottom:32px;
    }

    .brand{
      font-weight:700;
      font-size:32px;
      color:white;
      text-decoration:none;
      display:inline-block;
      margin-bottom:8px;
    }

    .brand-tagline{
      color:rgba(255,255,255,0.9);
      font-size:15px;
      margin:0;
    }

    .register-card{
      background:white;
      border-radius:20px;
      padding:40px;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }

    .card-header{
      text-align:center;
      margin-bottom:32px;
    }

    .card-header h1{
      font-size:28px;
      margin:0 0 8px;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .card-header p{
      color:var(--muted);
      margin:0;
      font-size:15px;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-label{
      display:block;
      font-weight:600;
      font-size:14px;
      color:var(--fg);
      margin-bottom:8px;
    }

    .form-input{
      width:100%;
      border:2px solid #e6e9ef;
      border-radius:10px;
      padding:12px 16px;
      font-size:15px;
      transition:all 0.2s;
      font-family:inherit;
    }

    .form-input:focus{
      outline:0;
      border-color:#2563eb;
      box-shadow:0 0 0 3px rgba(37,99,235,0.1);
    }

    .form-input::placeholder{
      color:#9ca3af;
    }

    .form-input.error{
      border-color:#dc2626;
    }

    .password-wrapper{
      position:relative;
    }

    .toggle-password{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:0;
      cursor:pointer;
      color:#6b7280;
      padding:4px;
      transition:color 0.2s;
    }

    .toggle-password:hover{
      color:#2563eb;
    }

    .password-strength{
      margin-top:8px;
      height:4px;
      background:#e6e9ef;
      border-radius:2px;
      overflow:hidden;
    }

    .password-strength-bar{
      height:100%;
      width:0;
      transition:all 0.3s;
      border-radius:2px;
    }

    .password-strength-bar.weak{
      width:33%;
      background:#ef4444;
    }

    .password-strength-bar.medium{
      width:66%;
      background:#f59e0b;
    }

    .password-strength-bar.strong{
      width:100%;
      background:#10b981;
    }

    .password-hint{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .terms-checkbox{
      display:flex;
      align-items:flex-start;
      gap:8px;
      margin-bottom:24px;
    }

    .terms-checkbox input{
      width:18px;
      height:18px;
      cursor:pointer;
      accent-color:#2563eb;
      margin-top:2px;
      flex-shrink:0;
    }

    .terms-checkbox label{
      font-size:14px;
      color:var(--muted);
      cursor:pointer;
      line-height:1.5;
    }

    .terms-checkbox a{
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
    }

    .terms-checkbox a:hover{
      text-decoration:underline;
    }

    .btn-submit{
      width:100%;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      border:0;
      padding:14px 28px;
      border-radius:10px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:all 0.2s;
      box-shadow:0 4px 12px rgba(37,99,235,0.3);
      margin-bottom:20px;
    }

    .btn-submit:hover:not(:disabled){
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(37,99,235,0.4);
    }

    .btn-submit:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .btn-submit.loading{
      position:relative;
      color:transparent;
    }

    .btn-submit.loading::after{
      content:'';
      position:absolute;
      width:20px;
      height:20px;
      top:50%;
      left:50%;
      margin-left:-10px;
      margin-top:-10px;
      border:3px solid rgba(255,255,255,0.3);
      border-radius:50%;
      border-top-color:white;
      animation:spin 0.6s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .login-prompt{
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .login-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
      transition:color 0.2s;
    }

    .login-link:hover{
      color:#7c3aed;
      text-decoration:underline;
    }

    .error-message{
      color:#dc2626;
      font-size:14px;
      margin-bottom:16px;
      padding:12px 16px;
      background:#fef2f2;
      border-radius:8px;
      border-left:3px solid #dc2626;
      display:none;
    }

    .error-message.show{
      display:block;
      animation:slideDown 0.3s;
    }

    .success-message{
      color:#059669;
      font-size:14px;
      margin-bottom:16px;
      padding:12px 16px;
      background:#f0fdf4;
      border-radius:8px;
      border-left:3px solid #059669;
      display:none;
    }

    .success-message.show{
      display:block;
      animation:slideDown 0.3s;
    }

    @keyframes slideDown{
      from{opacity:0;transform:translateY(-10px)}
      to{opacity:1;transform:translateY(0)}
    }

    .back-home{
      text-align:center;
      margin-top:24px;
    }

    .back-link{
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      transition:opacity 0.2s;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .back-link:hover{
      opacity:0.8;
    }


    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      background:#111827;
      color:white;
      padding:16px 24px;
      border-radius:12px;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
      opacity:0;
      transform:translateY(20px);
      transition:all 0.3s;
      z-index:1000;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    @media(max-width:500px){
      body{
        padding:20px;
      }
      .register-card{
        padding:32px 24px;
      }
      .brand{
        font-size:28px;
      }
      .card-header h1{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="brand-header">
      <a href="index.html" class="brand"><img src="https://raw.githubusercontent.com/puj-course/FIS_2610_3513_G6/main/assets/UnimercsLogo.png" alt="UNIMERCS" style="height:48px;width:auto;vertical-align:middle;"></a>
      <p class="brand-tagline">Tu marketplace de confianza</p>
    </div>

    <div class="register-card">
      <div class="card-header">
        <h1>Crea tu cuenta</h1>
        <p>Únete a la comunidad UniMercs</p>
      </div>

      <form id="register-form" novalidate>
        <div id="error-message" class="error-message" role="alert"></div>
        <div id="success-message" class="success-message" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="name">Nombre de Usuario</label>
          <input 
            type="text"
            id="name" 
            class="form-input"
            placeholder="Juan Pérez" 
            required 
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico institucional</label>
          <input 
            type="email"
            id="email" 
            class="form-input"
            placeholder="tu@javeriana.edu.co" 
            required 
            autocomplete="email"
          />
          <p class="password-hint">Debe ser un correo @javeriana.edu.co</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input 
              type="password"
              id="password" 
              class="form-input"
              placeholder="Mínimo 8 caracteres" 
              required 
              autocomplete="new-password"
            />
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>
          <p class="password-hint" id="strength-text">Usa al menos 8 caracteres</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <div class="password-wrapper">
            <input 
              type="password"
              id="confirm-password" 
              class="form-input"
              placeholder="Repite tu contraseña" 
              required 
              autocomplete="new-password"
            />
            <button type="button" class="toggle-password" id="toggle-confirm" aria-label="Toggle password visibility">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="terms-checkbox">
          <input type="checkbox" id="terms" required />
          <label for="terms">
            Acepto los <a href="#">términos y condiciones</a> y la <a href="#">política de privacidad</a> de UniMercs
          </label>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          Crear Cuenta
        </button>

        <div class="login-prompt">
          ¿Ya tienes una cuenta? <a href="login.html" class="login-link" id="goto-login">Inicia sesión</a>
        </div>
      </form>
    </div>

    <div class="back-home">
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Volver al inicio
      </a>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite" hidden></div>

  <!-- =====================================================
       PATRONES GoF — UniMercs
       1. Factory Method : JaverianaUserFactory / StudentUser
       2. Facade         : AuthFacade
       ===================================================== -->
  <script>
    /* ── PATRÓN 1: FACTORY METHOD ── */
    class User {
      constructor({ id, name, email, passwordHash, role, createdAt }) {
        this.id = id; this.name = name; this.email = email;
        this.passwordHash = passwordHash; this.role = role;
        this.profile = { posts: [], favorites: [], rating: 0 };
        this.createdAt = createdAt;
      }
    }
    class StudentUser extends User {
      constructor(data) { super({ ...data, role: 'student' }); }
      validate() {
        if (!this.email.endsWith('@javeriana.edu.co'))
          throw new Error('Correo debe ser @javeriana.edu.co');
      }
    }
    class UserFactory {
      createUser(data) { throw new Error('Implementar en subclase'); }
      register(data) {
        const hashedPassword = this._hashPassword(data.password);
        const user = this.createUser({
          id: String(Date.now()), name: data.name,
          email: data.email.toLowerCase(), passwordHash: hashedPassword,
          createdAt: new Date().toISOString()
        });
        user.validate();
        return user;
      }
      _hashPassword(p) { return btoa(p + '_unimercs_salt'); }
    }
    class JaverianaUserFactory extends UserFactory {
      createUser(data) {
        if (!data.email.endsWith('@javeriana.edu.co'))
          throw new Error('Solo se permiten correos @javeriana.edu.co');
        return new StudentUser(data);
      }
    }

    /* ── PATRÓN 2: FACADE ── */
    class UserStorageService {
      static USERS_KEY = 'unimercs_users';
      getAll() { return JSON.parse(localStorage.getItem(UserStorageService.USERS_KEY) || '[]'); }
      findByEmail(email) { return this.getAll().find(u => u.email === email.toLowerCase()) || null; }
      save(user) {
        const all = this.getAll();
        all.push(user);
        localStorage.setItem(UserStorageService.USERS_KEY, JSON.stringify(all));
      }
    }
    class SessionManager {
      static SESSION_KEY = 'unimercs_current_user';
      createSession(user, remember = false) {
        const s = { email: user.email, name: user.name, loginTime: new Date().toISOString(), remember };
        localStorage.setItem(SessionManager.SESSION_KEY, JSON.stringify(s));
        return s;
      }
      destroySession() { localStorage.removeItem(SessionManager.SESSION_KEY); }
      getSession() { const r = localStorage.getItem(SessionManager.SESSION_KEY); return r ? JSON.parse(r) : null; }
    }
    class AuthFacade {
      constructor() {
        this._storage = new UserStorageService();
        this._session = new SessionManager();
      }
      register(data) {
        if (this._storage.findByEmail(data.email))
          throw new Error('Ya existe una cuenta con este correo electrónico');
        const factory = new JaverianaUserFactory();
        const user = factory.register(data);
        this._storage.save(user);
        return this._session.createSession(user, true);
      }
      isAuthenticated() { return this._session.getSession() !== null; }
    }
  </script>

  <script>
    (function() {
      const USERS_KEY = 'unimercs_users';
      const CURRENT_USER_KEY = 'unimercs_current_user';

      const toast = document.getElementById('toast');
      function showToast(message) {
        if (!toast) return;
        toast.textContent = message;
        toast.hidden = false;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.hidden = true, 300);
        }, 2500);
      }

      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm-password');
      const toggleBtn = document.getElementById('toggle-password');
      const toggleConfirmBtn = document.getElementById('toggle-confirm');
      
      function setupToggle(btn, input) {
        btn?.addEventListener('click', () => {
          const type = input.type === 'password' ? 'text' : 'password';
          input.type = type;
          
          btn.innerHTML = type === 'password' 
            ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
            : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        });
      }

      setupToggle(toggleBtn, passwordInput);
      setupToggle(toggleConfirmBtn, confirmInput);


      const strengthBar = document.getElementById('strength-bar');
      const strengthText = document.getElementById('strength-text');

      passwordInput?.addEventListener('input', () => {
        const password = passwordInput.value;
        let strength = 0;
        let text = 'Débil';
        let className = 'weak';

        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^a-zA-Z0-9]/)) strength++;

        if (strength === 0) {
          strengthBar.className = 'password-strength-bar';
          strengthBar.style.width = '0';
          strengthText.textContent = 'Usa al menos 8 caracteres';
        } else if (strength <= 2) {
          strengthBar.className = 'password-strength-bar weak';
          strengthText.textContent = 'Contraseña débil';
        } else if (strength === 3) {
          strengthBar.className = 'password-strength-bar medium';
          strengthText.textContent = 'Contraseña media';
        } else {
          strengthBar.className = 'password-strength-bar strong';
          strengthText.textContent = 'Contraseña fuerte';
        }
      });

  
      const errorEl = document.getElementById('error-message');
      const successEl = document.getElementById('success-message');

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
        successEl.classList.remove('show');
      }

      function showSuccess(message) {
        successEl.textContent = message;
        successEl.classList.add('show');
        errorEl.classList.remove('show');
      }

      function hideMessages() {
        errorEl.classList.remove('show');
        successEl.classList.remove('show');
      }

      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }

      function validateJaverianaEmail(email) {
        return email.toLowerCase().endsWith('@javeriana.edu.co');
      }


      const registerForm = document.getElementById('register-form');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const termsCheckbox = document.getElementById('terms');
      const submitBtn = document.getElementById('submit-btn');

      registerForm?.addEventListener('submit', (e) => {
        e.preventDefault();
        hideMessages();

        const name = nameInput.value.trim();
        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;
        const termsAccepted = termsCheckbox.checked;

        if (!name || name.length < 2) {
          showError('Por favor ingresa tu nombre completo');
          nameInput.classList.add('error');
          return;
        }
        nameInput.classList.remove('error');

        if (!validateEmail(email)) {
          showError('Por favor ingresa un correo electrónico válido');
          emailInput.classList.add('error');
          return;
        }

        if (!validateJaverianaEmail(email)) {
          showError('Debes usar tu correo institucional (@javeriana.edu.co)');
          emailInput.classList.add('error');
          return;
        }
        emailInput.classList.remove('error');

        if (password.length < 8) {
          showError('La contraseña debe tener al menos 8 caracteres');
          passwordInput.classList.add('error');
          return;
        }
        passwordInput.classList.remove('error');

        if (password !== confirmPassword) {
          showError('Las contraseñas no coinciden');
          confirmInput.classList.add('error');
          return;
        }
        confirmInput.classList.remove('error');

        if (!termsAccepted) {
          showError('Debes aceptar los términos y condiciones');
          return;
        }

   
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');

        setTimeout(() => {
          try {
            // ── USO DE AUTHFACADE (Facade) + JAVERIANAUSER FACTORY (Factory Method) ──
            // AuthFacade orquesta: validar email único → JaverianaUserFactory.register()
            // → StudentUser.validate() → guardar en storage → crear sesión
            const auth = new AuthFacade();
            auth.register({ name, email, password });

            showSuccess(`¡Cuenta creada exitosamente! Bienvenido, ${name}!`);
            submitBtn.textContent = '✓ Cuenta creada!';
            submitBtn.style.background = 'linear-gradient(90deg,#10b981,#059669)';

            setTimeout(() => {
              window.location.href = 'index.html'; 
            }, 1500);

          } catch (err) {
            console.error('Registration error:', err);
            // Muestra el mensaje exacto del patrón (ej: "Solo se permiten correos @javeriana.edu.co")
            showError(err.message || 'Error al crear la cuenta. Por favor intenta de nuevo.');
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
          }
        }, 800);
      });

      document.getElementById('goto-login')?.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'login.html';
      });

      document.querySelectorAll('.terms-checkbox a').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          showToast('Documentos legales próximamente');
        });
      });
    })();
  </script>
</body>
</html>
